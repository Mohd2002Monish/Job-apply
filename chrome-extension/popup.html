<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Apply Importer</title>
  <style>
    :root {
      --bg-dark: #09090b;
      --card-bg: #18181b;
      --border-color: #27272a;
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 380px;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      overflow-y: auto;
      font-size: 14px;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 2px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 16px;
      color: var(--text-main);
    }

    .brand-accent {
      color: var(--primary);
    }

    .status-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--text-muted);
    }

    input, textarea {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    textarea {
      resize: vertical;
      height: 80px;
    }

    .btn-container {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
    }

    .btn-secondary {
      background: var(--border-color);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: #3f3f46;
    }

    .loading-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .alert {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      display: none;
      flex-direction: column;
      gap: 6px;
    }

    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success);
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .dashboard-link {
      display: inline-block;
      margin-top: 4px;
      color: #fff;
      background: var(--success);
      text-decoration: none;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 4px;
      text-align: center;
      font-size: 12px;
      transition: opacity 0.15s ease;
    }

    .dashboard-link:hover {
      opacity: 0.9;
    }

    .info-note {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span>🚀 Job<span class="brand-accent">Apply</span></span>
    </div>
    <div class="status-badge" id="domainBadge">Extension Ready</div>
  </header>

  <div id="alertSuccess" class="alert alert-success">
    <span>✓ Job imported successfully!</span>
    <a href="http://localhost:5173/" target="_blank" class="dashboard-link">Open Dashboard</a>
  </div>

  <div id="alertError" class="alert alert-error">
    <span id="errorMessage">Failed to scrape job page.</span>
  </div>

  <form id="importForm">
    <div class="form-group">
      <label for="jobTitle">Job Title *</label>
      <input type="text" id="jobTitle" required placeholder="e.g. Senior Software Engineer">
    </div>

    <div class="form-group">
      <label for="companyName">Company Name *</label>
      <input type="text" id="companyName" required placeholder="e.g. Google">
    </div>

    <div class="form-group">
      <label for="location">Location</label>
      <input type="text" id="location" placeholder="e.g. Remote / Mountain View, CA">
    </div>

    <div class="form-group">
      <label for="hrName">Recruiter Name</label>
      <input type="text" id="hrName" placeholder="e.g. Jane Doe (if known)">
    </div>

    <div class="form-group">
      <label for="email">Recruiter Email *</label>
      <input type="email" id="email" required placeholder="e.g. careers@company.com">
    </div>

    <div class="form-group">
      <label for="description">Job Description *</label>
      <textarea id="description" required placeholder="Paste the job description details here..."></textarea>
    </div>

    <div class="btn-container">
      <button type="button" class="btn-secondary" id="btnRescrape">
        <span>🔄 Re-scrape</span>
      </button>
      <button type="submit" class="btn-primary" id="btnSubmit">
        <span class="loading-spinner" id="btnSpinner"></span>
        <span id="btnText">Import Job</span>
      </button>
    </div>
  </form>

  <div class="info-note">
    Supports automatic scraping on LinkedIn and Indeed.
  </div>

  <script src="popup.js"></script>
</body>
</html>
