<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corporate Career Portal - Apply Now</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .form-container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #a5b4fc, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #e2e8f0;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="url"],
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background-color: rgba(15, 23, 42, 0.6);
      color: var(--text);
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    input[type="file"] {
      color: var(--text-muted);
      font-size: 14px;
    }

    .file-input-wrapper {
      padding: 16px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      text-align: center;
      background-color: rgba(15, 23, 42, 0.3);
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background-color: var(--primary);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      background-color: var(--primary-hover);
    }

    .success-message {
      display: none;
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #34d399;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div id="successBanner" class="success-message">
      Application Submitted Successfully! Thank you for applying.
    </div>

    <h1>Apply for Position</h1>
    <p class="subtitle">Complete the form below to submit your application details.</p>

    <form id="jobApplicationForm" onsubmit="event.preventDefault(); document.getElementById('successBanner').style.display = 'block'; window.scrollTo({top: 0, behavior: 'smooth'});">
      
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
      </div>

      <div class="form-group">
        <label for="location">Current Location (City, State/Country)</label>
        <input type="text" id="location" name="location" placeholder="San Francisco, CA">
      </div>

      <div class="form-group">
        <label for="linkedin">LinkedIn Profile URL</label>
        <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/username">
      </div>

      <div class="form-group">
        <label for="github">GitHub Profile URL</label>
        <input type="url" id="github" name="github" placeholder="https://github.com/username">
      </div>

      <div class="form-group">
        <label for="website">Portfolio / Personal Website</label>
        <input type="url" id="website" name="website" placeholder="https://myportfolio.com">
      </div>

      <div class="form-group">
        <label for="jobTitle">Desired Job Title</label>
        <input type="text" id="jobTitle" name="jobTitle" placeholder="Full Stack Developer">
      </div>

      <div class="form-group">
        <label for="summary">Professional Summary</label>
        <textarea id="summary" name="summary" placeholder="Briefly describe your experience and skills..."></textarea>
      </div>

      <div class="form-group">
        <label for="workAuth">Work Authorization Status</label>
        <select id="workAuth" name="workAuth" required>
          <option value="">Select an option...</option>
          <option value="us_citizen">US Citizen / Permanent Resident</option>
          <option value="needs_visa">Requires visa sponsorship (H1-B, etc.)</option>
          <option value="other">Other / Student Visa</option>
        </select>
      </div>

      <div class="form-group">
        <label for="resumeFile">Upload Resume (PDF/Word)</label>
        <div class="file-input-wrapper">
          <input type="file" id="resumeFile" name="resumeFile" accept=".pdf,.doc,.docx" required>
        </div>
      </div>

      <div class="form-group">
        <label for="coverLetter">Cover Letter (Optional)</label>
        <textarea id="coverLetter" name="coverLetter" placeholder="Paste your cover letter here..."></textarea>
      </div>

      <button type="submit" id="submitBtn">Submit Application</button>
    </form>
  </div>

</body>
</html>
