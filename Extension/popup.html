<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>RecoCareer.ai</title>
    <style>
      body { width: 320px; font-family: 'Inter', system-ui, sans-serif; padding: 16px; margin: 0; background: #09090b; color: #f4f4f5; }
      h3 { margin-top: 0; margin-bottom: 8px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
      p { font-size: 12px; color: #a1a1aa; margin-bottom: 16px; line-height: 1.4; }
      input { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 8px; border: 1px solid #27272a; background: #18181b; color: #fff; margin-bottom: 12px; font-size: 13px; outline: none; }
      input:focus { border-color: #6366f1; }
      button { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #4f46e5; color: white; font-weight: bold; font-size: 13px; cursor: pointer; transition: background 0.2s; }
      button:hover { background: #4338ca; }
      button:disabled { background: #3f3f46; color: #a1a1aa; cursor: not-allowed; }
      #status { font-size: 12px; margin-top: 12px; text-align: center; }
      .success { color: #10b981; }
      .error { color: #ef4444; }
    </style>
  </head>
  <body>
    <h3>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" />
      </svg>
      RecoCareer.ai
    </h3>
    <p>Paste a job posting URL below to extract its details into your dashboard using AI.</p>
    
    <input type="url" id="urlInput" placeholder="https://linkedin.com/jobs/..." />
    <button id="extractBtn">Extract & Save Job</button>
    
    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
